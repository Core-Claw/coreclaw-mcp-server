server {
    listen      __NGINX_LISTEN_PORT__;
    listen      [::]:__NGINX_LISTEN_PORT__;
    server_name __NGINX_SERVER_NAME__;

    client_max_body_size 10m;

    access_log /var/log/nginx/__SERVICE_NAME__.access.log;
    error_log  /var/log/nginx/__SERVICE_NAME__.error.log;

    location /mcp {
        proxy_pass http://127.0.0.1:__MCP_PORT__;

        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection        "";

        proxy_buffering          off;
        proxy_cache              off;
        proxy_request_buffering  off;
        chunked_transfer_encoding on;

        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;

        add_header X-Accel-Buffering no always;
    }

    location = / {
        default_type text/plain;
        return 200 "coreclaw-mcp-server ok\n";
    }
}